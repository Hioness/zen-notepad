<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Notepad</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="manifest" href="site.webmanifest">
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <meta name="theme-color" content="#333333">
    <style>
        :root {
            --bg-color: #F0EEE6;
            --text-color: #333333;
            --accent-color: #666666;
            --border-color: rgba(0, 0, 0, 0.1);
            --toolbar-bg: rgba(255, 255, 255, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --critical: #c53030;
            --critical-bg: rgba(197, 48, 48, 0.1);
            --radius: 8px;
            --radius-sm: 4px;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #999999;
            --border-color: rgba(255, 255, 255, 0.15);
            --toolbar-bg: rgba(40, 40, 40, 0.95);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --critical: #ff6b6b;
            --critical-bg: rgba(255, 107, 107, 0.15);
            --radius: 8px;
            --radius-sm: 4px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #ascii-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.08;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.2;
            white-space: pre;
            overflow: hidden;
            color: var(--text-color);
        }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            background: var(--toolbar-bg);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        #theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        #editor-container {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 80px 20px 120px;
            min-height: 100vh;
        }

        #editor {
            width: 100%;
            min-height: 60vh;
            outline: none;
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-color);
            background: transparent;
        }

        #editor.has-overflow {
            padding-bottom: 160px;
        }

        #editor-placeholder {
            position: absolute;
            top: 78px;
            left: 20px;
            color: var(--accent-color);
            opacity: 0.6;
            pointer-events: none;
            font-size: 18px;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            display: none;
        }

        #editor-placeholder.visible {
            display: inline-block;
        }

        #storage-warning {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: var(--critical-bg);
            border: 1px solid var(--critical);
            color: var(--critical);
            border-radius: var(--radius);
            font-size: 13px;
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            backdrop-filter: blur(10px);
        }

        #storage-warning.visible {
            opacity: 1;
            visibility: visible;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .font-serif {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
        }

        .font-sans {
            font-family: 'Inter', sans-serif;
        }

        #editor h1 {
            font-size: 2em;
            font-weight: 400;
            margin: 0.5em 0;
            line-height: 1.3;
        }

        #editor h2 {
            font-size: 1.5em;
            font-weight: 400;
            margin: 0.5em 0;
            line-height: 1.4;
        }

        #editor p {
            margin: 0.8em 0;
        }

        #editor b, #editor strong {
            font-weight: 600;
        }

        #editor i, #editor em {
            font-style: italic;
        }

        #editor ul {
            margin: 0.8em 0;
            padding-left: 1.4em;
        }

        #editor li {
            margin: 0.35em 0;
        }

        #editor hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1.6em 0;
        }

        #toolbar {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 8px;
            padding: 12px;
            background: var(--toolbar-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: 0 4px 20px var(--shadow-color);
            opacity: 0.6;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        #toolbar:hover {
            opacity: 1;
        }

        .toolbar-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            color: var(--text-color);
            cursor: pointer;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s ease;
            position: relative;
        }

        .toolbar-btn:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        .toolbar-btn.active {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .toolbar-btn .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            padding: 6px 10px;
            background: var(--text-color);
            color: var(--bg-color);
            font-size: 12px;
            border-radius: var(--radius);
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .toolbar-btn:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        .font-indicator {
            font-size: 12px;
            font-weight: 500;
        }

        #bottom-left {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            z-index: 100;
        }

        #word-counter {
            padding: 10px 16px;
            background: var(--toolbar-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 12px;
            color: var(--accent-color);
            font-family: 'JetBrains Mono', monospace;
            backdrop-filter: blur(10px);
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        #word-counter:hover {
            opacity: 1;
        }

        #paste-md-btn {
            padding: 10px 14px;
            background: var(--toolbar-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-color);
            font-size: 12px;
            backdrop-filter: blur(10px);
            opacity: 0.6;
            transition: opacity 0.3s ease;
            position: relative;
        }

        #paste-md-btn:hover {
            opacity: 1;
        }

        #paste-md-btn .tooltip {
            position: absolute;
            bottom: 100%;
            left: 0;
            transform: translateY(-8px);
            padding: 6px 10px;
            background: var(--text-color);
            color: var(--bg-color);
            font-size: 12px;
            border-radius: var(--radius);
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        #paste-md-btn:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--toolbar-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px var(--shadow-color);
            backdrop-filter: blur(10px);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 500;
            font-size: 16px;
        }

        .modal-close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-color);
            padding: 0;
            line-height: 1;
        }

        .modal-close-btn:hover {
            opacity: 0.6;
        }

        #md-input {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }

        #md-input:focus {
            border-color: var(--accent-color);
        }

        .modal-note {
            margin-top: 12px;
            font-size: 13px;
            color: var(--accent-color);
            line-height: 1.4;
        }

        .modal-note strong, .modal-note em, .modal-note code {
            font-size: 12px;
            padding: 1px 4px;
            border-radius: var(--radius-sm);
            background: var(--border-color);
        }

        .modal-note code {
            font-family: 'JetBrains Mono', monospace;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }

        .modal-btn {
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .modal-btn.primary {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .modal-btn.primary:hover {
            opacity: 0.85;
        }

        .modal-btn.secondary {
            background: transparent;
            color: var(--text-color);
        }

        .modal-btn.secondary:hover {
            background: var(--border-color);
        }

        /* ── Confirm Dialog ───────────────────────────────────────────── */
        .confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .confirm-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .confirm-dialog {
            background: var(--toolbar-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
            width: 90%;
            max-width: 380px;
        }

        .confirm-dialog p {
            font-size: 14px;
            color: var(--text-color);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .confirm-dialog p strong {
            font-weight: 600;
            color: var(--text-color);
        }

        .confirm-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .confirm-btn {
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .confirm-btn.cancel {
            background: transparent;
            color: var(--text-color);
        }

        .confirm-btn.cancel:hover {
            background: var(--border-color);
        }

        .confirm-btn.danger {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .confirm-btn.danger:hover {
            opacity: 0.85;
        }

        @media (max-width: 600px) {
            #editor-container {
                padding: 60px 16px 100px;
            }

            #editor {
                font-size: 16px;
            }

            #toolbar {
                bottom: 20px;
                right: 20px;
                padding: 8px;
                gap: 4px;
            }

            .toolbar-btn {
                width: 36px;
                height: 36px;
            }

            #theme-toggle {
                top: 16px;
                right: 16px;
                width: 40px;
                height: 40px;
            }

            #bottom-left {
                bottom: 20px;
            }

            #word-counter {
                padding: 8px 12px;
                font-size: 11px;
            }

            #paste-md-btn {
                padding: 8px 12px;
            }
        }
        /* App Layout */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        .app-content {
            flex: 1;
            min-width: 0;
        }

        /* Floating toggle — visible in chrome when sidebar is closed */
        #sidebar-toggle-chrome {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            background: var(--toolbar-bg);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 50;
        }

        #sidebar-toggle-chrome:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        #sidebar-overlay {
            display: none;
        }

        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: var(--bg-color);
            border-right: 1px solid var(--border-color);
            transform: translateX(-100%);
            transition: transform 0.3s ease, background-color 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 150;
            box-shadow: 4px 0 20px var(--shadow-color);
            will-change: transform;
        }

        #sidebar.open {
            transform: translateX(0);
        }

        .sidebar-inner {
            width: 280px;
            height: 100%;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        @media (max-width: 899px) {
            .sidebar-inner {
                width: 100%;
            }
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        /* Toggle inside sidebar header — visible when sidebar is open */
        #sidebar-toggle {
            width: 44px;
            height: 44px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            background: var(--toolbar-bg);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease, transform 0.2s ease;
            flex-shrink: 0;
        }

        #sidebar-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .sidebar-header h2 {
            font-size: 16px;
            font-weight: 500;
            margin: 0;
        }

        #new-note-btn {
            margin: 16px 20px 8px;
            padding: 10px 16px;
            background: var(--text-color);
            color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s ease;
            flex-shrink: 0;
        }

        #new-note-btn:hover {
            opacity: 0.85;
        }

        #sidebar-notes {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding: 8px 12px 20px;
        }

        .sidebar-note-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 4px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text-color);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            text-align: left;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        .sidebar-note-item:hover {
            background: var(--border-color);
        }

        .sidebar-note-item.active {
            background: var(--border-color);
            border-color: var(--border-color);
        }

        .sidebar-note-title-btn {
            flex: 1;
            display: flex;
            align-items: center;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            text-align: left;
            padding: 0;
            cursor: pointer;
            overflow: hidden;
        }

        .sidebar-note-title-btn:focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: -2px;
            border-radius: var(--radius-sm);
        }

        .sidebar-note-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar-note-delete {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            padding: 2px 6px;
            font-size: 16px;
            line-height: 1;
            border-radius: var(--radius-sm);
            opacity: 0.4;
            transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
            flex-shrink: 0;
        }

        .sidebar-note-item:hover .sidebar-note-delete {
            opacity: 1;
        }

        .sidebar-note-delete:hover {
            background: var(--critical-bg);
            color: var(--critical);
            opacity: 1;
        }

        @media (max-width: 899px) {
            .app-layout {
                display: block;
            }

            #sidebar-toggle-chrome {
                top: 16px;
                left: 16px;
                width: 40px;
                height: 40px;
            }

            #sidebar-toggle {
                width: 40px;
                height: 40px;
            }

            #sidebar-overlay {
                display: block;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.4);
                z-index: 140;
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.3s ease, visibility 0.3s ease;
            }

            #sidebar-overlay.open {
                opacity: 1;
                visibility: visible;
            }

            #sidebar {
                height: 100%;
                transition: transform 0.3s ease, visibility 0s ease 0.3s, background-color 0.3s ease;
                visibility: hidden;
            }

            #sidebar.open {
                visibility: visible;
                transition: transform 0.3s ease, visibility 0s ease 0s, background-color 0.3s ease;
            }
        }

        @media (min-width: 900px) {
            .app-content {
                transition: margin-left 0.3s ease;
            }
            .sidebar-expanded .app-content {
                margin-left: 280px;
            }
            .sidebar-expanded #sidebar-toggle-chrome {
                opacity: 0;
                pointer-events: none;
            }
            #bottom-left {
                transition: transform 0.3s ease;
            }
            .sidebar-expanded #bottom-left {
                transform: translateX(280px);
            }
        }

        @media (max-width: 600px) {
            #sidebar {
                width: 260px;
            }
        }
    </style>
</head>
<body>
    <div id="ascii-background"></div>

    <div class="app-layout">
        <div id="sidebar-overlay" aria-hidden="true"></div>
        <nav id="sidebar" role="navigation" aria-label="Notes sidebar" aria-hidden="true">
            <div class="sidebar-inner">
                <div class="sidebar-header">
                    <button id="sidebar-toggle" aria-label="Toggle notes sidebar" aria-expanded="false">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <h2>Notes</h2>
                </div>
                <button id="new-note-btn" type="button">+ New note</button>
                <div id="sidebar-notes"></div>
            </div>
        </nav>

        <div class="app-content">
            <button id="sidebar-toggle-chrome" aria-label="Toggle notes sidebar" aria-expanded="false">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <div id="editor-container">
                <div id="editor-placeholder" class="font-mono visible">Start writing...</div>
                <div id="editor" class="font-mono" role="textbox" aria-multiline="true" aria-label="Editor" contenteditable="true" spellcheck="false"></div>
            </div>
        </div>

        <button id="theme-toggle" aria-label="Toggle theme">
            <span id="theme-icon">🌙</span>
        </button>

        <div id="storage-warning">Storage full — copy your text to avoid losing work</div>

        <div id="bottom-left">
            <button id="paste-md-btn" aria-label="Import Markdown">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="7" y="4" width="10" height="14" rx="2" ry="2"></rect>
                    <rect x="9" y="2" width="6" height="3" rx="1" ry="1"></rect>
                </svg>
                <span class="tooltip">Import Markdown</span>
            </button>

                <span class="tooltip">Bullet List</span>

                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>

                Converts: <strong>**bold**</strong>, <em>*italic*</em>, <code># heading</code>, <code>## heading</code>, <code>- list item</code>, and <code>---</code> rules. Other formatting is preserved as plain text.

    <script>
        const editor = document.getElementById('editor');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const fontBtn = document.getElementById('font-btn');
        const copyBtn = document.getElementById('copy-btn');
        const asciiBg = document.getElementById('ascii-background');
        const toolbarBtns = document.querySelectorAll('.toolbar-btn[data-command]');
        const listBtn = document.querySelector('.toolbar-btn[data-command="insertUnorderedList"]');
        const boldBtn = document.querySelector('.toolbar-btn[data-command="bold"]');
        const italicBtn = document.querySelector('.toolbar-btn[data-command="italic"]');
        const headingBtn = document.getElementById('heading-btn');
        const headingLabel = document.getElementById('heading-label');
        const headingTooltip = document.getElementById('heading-tooltip');
        const editorPlaceholder = document.getElementById('editor-placeholder');
        const sidebarToggle = document.getElementById('sidebar-toggle-chrome');
        const sidebarToggleHeader = document.getElementById('sidebar-toggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const sidebarNotes = document.getElementById('sidebar-notes');
        const newNoteBtn = document.getElementById('new-note-btn');

        const fonts = ['font-sans', 'font-serif', 'font-mono'];
        const fontNames = ['Sans', 'Serif', 'Mono'];

        let notes = [];
        let activeNoteId = null;

        let saveTimeout;
        let animationId;
        let time = 0;

        const chars = ['█', '▓', '▒', '░', '·'];

        const PURIFY_CONFIG = {
            ALLOWED_TAGS: ['p', 'br', 'div', 'h1', 'h2', 'h3', 'strong', 'b', 'em', 'i', 'ul', 'li', 'hr', 'blockquote', 'code', 'pre', 'a', 'span'],
            ALLOWED_ATTR: ['href', 'class']
        };

        const confirmOverlay = document.getElementById('confirm-overlay');
        const confirmMessage = document.getElementById('confirm-message');
        const confirmCancel = document.getElementById('confirm-cancel');
        const confirmOk = document.getElementById('confirm-ok');

        const storageWarning = document.getElementById('storage-warning');
        let resizeTimeout;
        let savedRange = null;

        function showStorageWarning() {
            storageWarning.classList.add('visible');
        }

        function hideStorageWarning() {
            storageWarning.classList.remove('visible');
        }

        function fallbackCopy(text, onSuccess, onError) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                const success = document.execCommand('copy');
                document.body.removeChild(textarea);
                if (success) onSuccess(); else onError();
            } catch (e) {
                document.body.removeChild(textarea);
                onError();
            }
        }

        function generateAsciiWave() {
            const width = Math.ceil(window.innerWidth / 8.4) + 2;
            const height = Math.ceil(window.innerHeight / 17);
            let output = '';

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const wave1 = Math.sin((x * 0.1) + (time * 0.02));
                    const wave2 = Math.cos((y * 0.08) + (time * 0.015));
                    const wave3 = Math.sin(((x + y) * 0.05) + (time * 0.01));
                    
                    const value = (wave1 + wave2 + wave3 + 3) / 6;
                    const charIndex = Math.floor(value * (chars.length - 1));
                    output += chars[Math.min(Math.max(charIndex, 0), chars.length - 1)];
                }
                output += '\n';
            }

            asciiBg.textContent = output;
            time++;
            animationId = requestAnimationFrame(generateAsciiWave);
        }

        function createNoteObject(content = '', font = 'font-mono') {
            const now = new Date().toISOString();
            return {
                id: Date.now().toString(36) + Math.random().toString(36).substring(2, 8),
                content: content,
                font: font,
                createdAt: now,
                updatedAt: now
            };
        }

        function getNoteTitle(html) {
            const temp = document.createElement('div');
            temp.innerHTML = html;

            const heading = temp.querySelector('h1, h2, h3');
            if (heading) {
                const text = heading.textContent.trim();
                if (text) return text.substring(0, 40) || 'Untitled note';
            }

            for (const child of temp.children) {
                if (child.matches('h1, h2, h3')) continue;
                const text = child.textContent.trim();
                if (text) return text.substring(0, 40);
            }

            const allText = temp.textContent.trim();
            if (allText) return allText.substring(0, 40);

            return 'Untitled note';
        }

        function loadNotes() {
            const stored = localStorage.getItem('zen-notes');
            if (stored) {
                try {
                    notes = JSON.parse(stored);
                    if (!Array.isArray(notes) || notes.length === 0) {
                        notes = [createNoteObject()];
                    }
                } catch (e) {
                    notes = [createNoteObject()];
                }
            } else {
                const legacyContent = localStorage.getItem('zen-content');
                if (legacyContent) {
                    notes = [createNoteObject(legacyContent)];
                } else {
                    notes = [createNoteObject()];
                }
            }

            // Migrate notes created before per-note fonts.
            for (const note of notes) {
                if (!note.font || !fonts.includes(note.font)) {
                    note.font = 'font-mono';
                }
            }

            const storedActiveId = localStorage.getItem('zen-active-note-id');
            if (storedActiveId && notes.some(n => n.id === storedActiveId)) {
                activeNoteId = storedActiveId;
            } else {
                activeNoteId = notes[0].id;
            }

            const activeNote = notes.find(n => n.id === activeNoteId);
            if (activeNote && activeNote.content) {
                const clean = DOMPurify.sanitize(activeNote.content, PURIFY_CONFIG);
                editor.innerHTML = clean;
            } else {
                editor.innerHTML = '';
            }

            editorPlaceholder.classList.toggle('visible', isEditorEmpty());
            updateWordCounter();
            updateToolbarActiveState();
            updateScrollPadding();
            renderSidebar();
        }

        function loadSettings() {
            const savedTheme = localStorage.getItem('zen-theme');

            loadNotes();

            const activeNote = notes.find(n => n.id === activeNoteId);
            if (activeNote) {
                applyFontToEditor(activeNote.font);
            }

            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
            } else {
                document.body.removeAttribute('data-theme');
                themeIcon.textContent = '🌙';
            }
        }

        function saveContent() {
            const activeNote = notes.find(n => n.id === activeNoteId);
            if (activeNote) {
                activeNote.content = editor.innerHTML;
                activeNote.updatedAt = new Date().toISOString();
            }

            try {
                localStorage.setItem('zen-notes', JSON.stringify(notes));
                localStorage.setItem('zen-active-note-id', activeNoteId);
                hideStorageWarning();
            } catch (e) {
                if (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014) {
                    showStorageWarning();
                }
            }

            if (activeNote) {
                const item = sidebarNotes.querySelector(`[data-note-id="${activeNoteId}"]`);
                if (item) {
                    const titleEl = item.querySelector('.sidebar-note-title');
                    if (titleEl) titleEl.textContent = getNoteTitle(activeNote.content);
                }
            }
        }

        function createNote() {
            clearTimeout(saveTimeout);
            saveContent();
            const note = createNoteObject('');
            notes.unshift(note);
            activeNoteId = note.id;
            editor.innerHTML = '';
            applyFontToEditor(note.font);
            saveContent();
            renderSidebar();
            editorPlaceholder.classList.add('visible');
            updateWordCounter();
            updateScrollPadding();
            if (isSidebarOverlayMode()) {
                closeSidebar();
            }
            editor.focus();
        }

        function switchNote(id) {
            if (id === activeNoteId) return;
            clearTimeout(saveTimeout);
            saveContent();
            activeNoteId = id;
            const note = notes.find(n => n.id === activeNoteId);
            if (note && note.content) {
                const clean = DOMPurify.sanitize(note.content, PURIFY_CONFIG);
                editor.innerHTML = clean;
            } else {
                editor.innerHTML = '';
            }
            if (note) {
                applyFontToEditor(note.font);
            }
            editorPlaceholder.classList.toggle('visible', isEditorEmpty());
            updateWordCounter();
            updateToolbarActiveState();
            updateScrollPadding();
            saveContent();
            renderSidebar();
            if (isSidebarOverlayMode()) {
                closeSidebar();
            }
            editor.focus();
        }

        /* ── Confirm Dialog ────────────────────────────────────────────── */
        let confirmCallback = null;

        function showConfirmDialog(message, onConfirm) {
            confirmCallback = onConfirm;
            confirmMessage.innerHTML = message;
            confirmOverlay.classList.add('active');
            confirmCancel.focus();
        }

        function hideConfirmDialog() {
            confirmOverlay.classList.remove('active');
            confirmCallback = null;
        }

        confirmCancel.addEventListener('click', hideConfirmDialog);

        confirmOk.addEventListener('click', () => {
            if (confirmCallback) {
                confirmCallback();
                confirmCallback = null;
            }
            hideConfirmDialog();
        });

        confirmOverlay.addEventListener('click', (e) => {
            if (e.target === confirmOverlay) {
                hideConfirmDialog();
            }
        });

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function deleteNote(id) {
            clearTimeout(saveTimeout);
            saveContent();

            const wasActive = activeNoteId === id;
            const deletedNote = notes.find(n => n.id === id);
            const inheritedFont = deletedNote ? deletedNote.font : 'font-mono';
            notes = notes.filter(n => n.id !== id);

            if (notes.length === 0) {
                const newNote = createNoteObject('', inheritedFont);
                notes.push(newNote);
                activeNoteId = newNote.id;
            } else if (wasActive) {
                activeNoteId = notes[0].id;
            }

            if (wasActive) {
                const activeNote = notes.find(n => n.id === activeNoteId);
                if (activeNote && activeNote.content) {
                    const clean = DOMPurify.sanitize(activeNote.content, PURIFY_CONFIG);
                    editor.innerHTML = clean;
                } else {
                    editor.innerHTML = '';
                }
                if (activeNote) {
                    applyFontToEditor(activeNote.font);
                }
                editorPlaceholder.classList.toggle('visible', isEditorEmpty());
                updateWordCounter();
                updateToolbarActiveState();
                updateScrollPadding();
            }

            saveContent();
            renderSidebar();
            if (wasActive) {
                editor.focus();
            }
        }

        function renderSidebar() {
            const sorted = [...notes].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

            sidebarNotes.innerHTML = '';
            for (const note of sorted) {
                const item = document.createElement('div');
                item.className = 'sidebar-note-item' + (note.id === activeNoteId ? ' active' : '');
                item.setAttribute('data-note-id', note.id);

                const titleBtn = document.createElement('button');
                titleBtn.className = 'sidebar-note-title-btn';
                titleBtn.setAttribute('type', 'button');
                titleBtn.setAttribute('aria-label', 'Open note: ' + getNoteTitle(note.content));

                const titleSpan = document.createElement('span');
                titleSpan.className = 'sidebar-note-title';
                titleSpan.textContent = getNoteTitle(note.content);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'sidebar-note-delete';
                deleteBtn.setAttribute('aria-label', 'Delete note');
                deleteBtn.setAttribute('type', 'button');
                deleteBtn.textContent = '\u00d7';

                titleBtn.appendChild(titleSpan);
                item.appendChild(titleBtn);
                item.appendChild(deleteBtn);
                sidebarNotes.appendChild(item);
            }
        }

        function trapSidebarFocus(e) {
            if (e.key !== 'Tab') return;
            const focusable = sidebar.querySelectorAll('button, [tabindex]:not([tabindex="-1"])');
            const visible = Array.from(focusable).filter(el => el.offsetParent !== null);
            if (visible.length === 0) return;
            const first = visible[0];
            const last = visible[visible.length - 1];
            if (e.shiftKey) {
                if (document.activeElement === first) {
                    e.preventDefault();
                    last.focus();
                }
            } else {
                if (document.activeElement === last) {
                    e.preventDefault();
                    first.focus();
                }
            }
        }

        function isSidebarOverlayMode() {
            return window.innerWidth < 900;
        }

        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('open');
            document.body.classList.add('sidebar-expanded');
            sidebarToggle.setAttribute('aria-expanded', 'true');
            sidebarToggleHeader.setAttribute('aria-expanded', 'true');
            sidebar.setAttribute('aria-hidden', 'false');
            sidebarOverlay.setAttribute('aria-hidden', 'false');
            if (isSidebarOverlayMode()) {
                document.addEventListener('keydown', trapSidebarFocus);
                newNoteBtn.focus();
            }
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
            document.body.classList.remove('sidebar-expanded');
            sidebarToggle.setAttribute('aria-expanded', 'false');
            sidebarToggleHeader.setAttribute('aria-expanded', 'false');
            sidebar.setAttribute('aria-hidden', 'true');
            sidebarOverlay.setAttribute('aria-hidden', 'true');
            document.removeEventListener('keydown', trapSidebarFocus);
            sidebarToggle.focus();
        }

        function toggleSidebar() {
            if (sidebar.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        }

        function applyFontToEditor(fontClass) {
            fonts.forEach(f => {
                editor.classList.remove(f);
                editorPlaceholder.classList.remove(f);
            });
            editor.classList.add(fontClass);
            editorPlaceholder.classList.add(fontClass);
        }

        function cycleFont() {
            const note = notes.find(n => n.id === activeNoteId);
            if (!note) return;

            const currentIndex = fonts.indexOf(note.font);
            const nextIndex = (currentIndex + 1) % fonts.length;
            note.font = fonts[nextIndex];
            note.updatedAt = new Date().toISOString();

            applyFontToEditor(note.font);
            saveContent();

            const indicator = fontBtn.querySelector('.font-indicator');
            indicator.textContent = fontNames[nextIndex];
            setTimeout(() => {
                indicator.textContent = 'Aa';
            }, 800);
        }

        function toggleTheme() {
            const isDark = document.body.hasAttribute('data-theme');
            if (isDark) {
                document.body.removeAttribute('data-theme');
                themeIcon.textContent = '🌙';
                try {
                    localStorage.setItem('zen-theme', 'light');
                } catch (e) {
                }
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
                try {
                    localStorage.setItem('zen-theme', 'dark');
                } catch (e) {
                }
            }
        }

        function showCopiedFeedback(btn) {
            const tooltip = btn.querySelector('.tooltip');
            const originalText = tooltip.textContent;
            tooltip.textContent = 'Copied!';
            setTimeout(() => {
                tooltip.textContent = originalText;
            }, 1200);
        }

        function htmlToMarkdown(element) {
            let markdown = '';
            
            function traverse(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return node.textContent;
                }
                
                if (node.nodeType !== Node.ELEMENT_NODE) {
                    return '';
                }
                
                const tag = node.tagName.toLowerCase();
                let content = '';
                
                for (const child of node.childNodes) {
                    content += traverse(child);
                }
                
                switch (tag) {
                    case 'h1':
                        return '# ' + content.trim() + '\n\n';
                    case 'h2':
                        return '## ' + content.trim() + '\n\n';
                    case 'h3':
                        return '### ' + content.trim() + '\n\n';
                    case 'b':
                    case 'strong':
                        return '**' + content + '**';
                    case 'i':
                    case 'em':
                        return '*' + content + '*';
                    case 'p':
                        return content.trim() + '\n\n';
                    case 'br':
                        return '\n';
                    case 'div':
                        return content + '\n';
                    case 'ul':
                        return content;
                    case 'li':
                        return '- ' + content.trim() + '\n';
                    case 'hr':
                        return '---\n\n';
                    case 'blockquote':
                        return '> ' + content.trim().replace(/\n/g, '\n> ') + '\n\n';
                    case 'code':
                        return '`' + content + '`';
                    case 'pre':
                        return '\`\`\`\n' + content.trim() + '\n\`\`\`\n\n';
                    case 'a':
                        const href = node.getAttribute('href') || '';
                        return '[' + content + '](' + href + ')';
                    default:
                        return content;
                }
            }
            
            for (const child of element.childNodes) {
                markdown += traverse(child);
            }
            
            return markdown.trim();
        }

        function markdownToHtml(markdown) {
            const lines = markdown.split('\n');
            let html = '';
            let inParagraph = false;
            let inList = false;
            let inBlockquote = false;
            let inCodeBlock = false;
            let codeBuffer = '';

            function convertInline(text) {
                text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
                text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                text = text.replace(/(?<!\*)\*\*\*(?!\*)(.+?)(?<!\*)\*\*\*(?!\*)/g, '<strong><em>$1</em></strong>');
                text = text.replace(/(?<!\*)\*\*(?!\*)(.+?)(?<!\*)\*\*(?!\*)/g, '<strong>$1</strong>');
                text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
                text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
                text = text.replace(/(?<!\w)_(.+?)_(?!\w)/g, '<em>$1</em>');
                return text;
            }

            function closeParagraph() {
                if (inParagraph) {
                    html += '</p>';
                    inParagraph = false;
                }
            }

            function closeList() {
                if (inList) {
                    html += '</ul>';
                    inList = false;
                }
            }

            function closeBlockquote() {
                if (inBlockquote) {
                    html += '</blockquote>';
                    inBlockquote = false;
                }
            }

            function closeCodeBlock() {
                if (inCodeBlock) {
                    html += '</code></pre>';
                    inCodeBlock = false;
                    codeBuffer = '';
                }
            }

            for (let i = 0; i < lines.length; i++) {
                const rawLine = lines[i];
                const line = rawLine.trim();

                if (inCodeBlock) {
                    if (line === '```') {
                        closeCodeBlock();
                    } else {
                        codeBuffer += rawLine + '\n';
                    }
                    continue;
                }

                if (line === '```') {
                    closeParagraph();
                    closeList();
                    closeBlockquote();
                    inCodeBlock = true;
                    codeBuffer = '';
                    html += '<pre><code>';
                    continue;
                }

                if (line === '') {
                    closeParagraph();
                    closeList();
                    closeBlockquote();
                    continue;
                }

                if (/^\s*([-*_])(?:\s*\1){2,}\s*$/.test(line)) {
                    closeParagraph();
                    closeList();
                    closeBlockquote();
                    html += '<hr>';
                    continue;
                }

                if (line.startsWith('# ')) {
                    closeParagraph();
                    closeList();
                    closeBlockquote();
                    html += '<h1>' + convertInline(line.substring(2)) + '</h1>';
                } else if (line.startsWith('## ')) {
                    closeParagraph();
                    closeList();
                    closeBlockquote();
                    html += '<h2>' + convertInline(line.substring(3)) + '</h2>';
                } else if (line.startsWith('### ')) {
                    closeParagraph();
                    closeList();
                    closeBlockquote();
                    html += '<h3>' + convertInline(line.substring(4)) + '</h3>';
                } else if (line.startsWith('- ') || line.startsWith('* ')) {
                    closeParagraph();
                    closeBlockquote();
                    if (!inList) {
                        inList = true;
                        html += '<ul>';
                    }
                    html += '<li>' + convertInline(line.substring(2)) + '</li>';
                } else if (line.startsWith('> ')) {
                    closeParagraph();
                    closeList();
                    if (!inBlockquote) {
                        inBlockquote = true;
                        html += '<blockquote>';
                    }
                    html += '<p>' + convertInline(line.substring(2)) + '</p>';
                } else {
                    closeList();
                    closeBlockquote();
                    if (!inParagraph) {
                        html += '<p>';
                        inParagraph = true;
                    } else {
                        html += ' ';
                    }
                    html += convertInline(line);
                }
            }

            closeParagraph();
            closeList();
            closeBlockquote();
            closeCodeBlock();

            return html;
        }

        function copyText() {
            const markdown = htmlToMarkdown(editor);
            
            function onSuccess() {
                showCopiedFeedback(copyBtn);
            }
            
            function onError() {
                const tooltip = copyBtn.querySelector('.tooltip');
                const originalText = tooltip.textContent;
                tooltip.textContent = 'Copy failed';
                setTimeout(() => {
                    tooltip.textContent = originalText;
                }, 1200);
            }
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(markdown).then(onSuccess).catch(() => {
                    fallbackCopy(markdown, onSuccess, onError);
                });
            } else {
                fallbackCopy(markdown, onSuccess, onError);
            }
        }

        const mdModal = document.getElementById('md-modal');
        const mdInput = document.getElementById('md-input');
        const pasteMdBtn = document.getElementById('paste-md-btn');
        const modalClose = document.getElementById('modal-close');
        const modalCancel = document.getElementById('modal-cancel');
        const modalInsert = document.getElementById('modal-insert');

        function trapFocus(e) {
            if (e.key !== 'Tab') return;
            const focusable = mdModal.querySelectorAll('button, textarea');
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            
            if (e.shiftKey) {
                if (document.activeElement === first) {
                    e.preventDefault();
                    last.focus();
                }
            } else {
                if (document.activeElement === last) {
                    e.preventDefault();
                    first.focus();
                }
            }
        }

        function saveSelection() {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                if (editor.contains(range.commonAncestorContainer)) {
                    savedRange = range.cloneRange();
                }
            }
        }

        function openModal() {
            closeSidebar();
            mdModal.classList.add('active');
            mdModal.removeAttribute('aria-hidden');
            document.getElementById('editor-container').setAttribute('aria-hidden', 'true');
            document.getElementById('toolbar').setAttribute('aria-hidden', 'true');
            document.getElementById('bottom-left').setAttribute('aria-hidden', 'true');
            document.getElementById('theme-toggle').setAttribute('aria-hidden', 'true');
            document.getElementById('sidebar-toggle').setAttribute('aria-hidden', 'true');
            document.getElementById('storage-warning').setAttribute('aria-hidden', 'true');
            saveSelection();
            mdInput.value = '';
            mdInput.focus();
            document.addEventListener('keydown', trapFocus);
        }

        function closeModal() {
            mdModal.classList.remove('active');
            mdModal.setAttribute('aria-hidden', 'true');
            document.getElementById('editor-container').removeAttribute('aria-hidden');
            document.getElementById('toolbar').removeAttribute('aria-hidden');
            document.getElementById('bottom-left').removeAttribute('aria-hidden');
            document.getElementById('theme-toggle').removeAttribute('aria-hidden');
            document.getElementById('sidebar-toggle').removeAttribute('aria-hidden');
            document.getElementById('storage-warning').removeAttribute('aria-hidden');
            editor.focus();
            document.removeEventListener('keydown', trapFocus);
        }

        function insertMarkdown() {
            const md = mdInput.value;
            if (!md.trim()) {
                closeModal();
                return;
            }

            const html = markdownToHtml(md);
            const clean = DOMPurify.sanitize(html, PURIFY_CONFIG);

            editor.focus();

            let range = null;

            // Prefer saved range from before modal opened
            if (savedRange) {
                try {
                    if (editor.contains(savedRange.commonAncestorContainer)) {
                        range = savedRange;
                    }
                } catch (e) {
                    // savedRange may be disconnected
                }
                savedRange = null;
            }

            // Fall back to current selection
            if (!range) {
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const selRange = sel.getRangeAt(0);
                    if (editor.contains(selRange.commonAncestorContainer)) {
                        range = selRange;
                    }
                }
            }

            if (range) {
                range.deleteContents();
                const frag = document.createRange().createContextualFragment(clean);
                range.insertNode(frag);
                range.collapse(false);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            } else {
                // No valid selection — append at end
                const frag = document.createRange().createContextualFragment(clean);
                editor.appendChild(frag);
            }

            editorPlaceholder.classList.toggle('visible', isEditorEmpty());
            updateScrollPadding();
            saveContent();
            closeModal();
        }

        pasteMdBtn.addEventListener('click', openModal);
        modalClose.addEventListener('click', closeModal);
        modalCancel.addEventListener('click', closeModal);
        modalInsert.addEventListener('click', insertMarkdown);

        mdModal.addEventListener('click', (e) => {
            if (e.target === mdModal) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && mdModal.classList.contains('active')) {
                closeModal();
            }
        });

        function execCommand(command, value = null) {
            document.execCommand(command, false, value);
            editor.focus();
            updateToolbarActiveState();
        }

        function getCurrentBlock() {
            const sel = window.getSelection();
            if (sel.rangeCount === 0) return null;
            let node = sel.getRangeAt(0).commonAncestorContainer;
            if (node.nodeType === Node.TEXT_NODE) {
                node = node.parentElement;
            }
            const block = node.closest('p, li, h1, h2, h3, div');
            if (block && block !== editor && editor.contains(block)) {
                return block;
            }
            return null;
        }

        function convertLineToList(block) {
            const sel = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(block);
            sel.removeAllRanges();
            sel.addRange(range);
            document.execCommand('delete', false, null);
            document.execCommand('insertUnorderedList', false, null);
        }

        function convertLineToHr(block) {
            const hr = document.createElement('hr');
            const p = document.createElement('p');
            p.appendChild(document.createElement('br'));
            const frag = document.createDocumentFragment();
            frag.appendChild(hr);
            frag.appendChild(p);
            block.parentNode.replaceChild(frag, block);

            const sel = window.getSelection();
            sel.removeAllRanges();
            const range = document.createRange();
            range.setStart(p, 0);
            range.collapse(true);
            sel.addRange(range);
        }

        function insertHorizontalRule() {
            editor.focus();
            const sel = window.getSelection();
            if (sel.rangeCount > 0 && editor.contains(sel.getRangeAt(0).commonAncestorContainer)) {
                document.execCommand('insertHTML', false, '<hr><p><br></p>');
            } else {
                const frag = document.createRange().createContextualFragment('<hr><p><br></p>');
                editor.appendChild(frag);
            }
            editor.focus();
        }

        function updateToolbarActiveState() {
            const sel = window.getSelection();
            if (sel.rangeCount === 0 || !editor.contains(sel.getRangeAt(0).commonAncestorContainer)) {
                document.querySelectorAll('.toolbar-btn.active').forEach(btn => btn.classList.remove('active'));
                headingLabel.textContent = 'H';
                headingTooltip.textContent = 'Heading: Off';
                return;
            }
            let node = sel.getRangeAt(0).commonAncestorContainer;
            if (node.nodeType === Node.TEXT_NODE) {
                node = node.parentElement;
            }
            boldBtn.classList.toggle('active', document.queryCommandState('bold'));
            italicBtn.classList.toggle('active', document.queryCommandState('italic'));
            const inH1 = node.closest('h1') !== null;
            const inH2 = node.closest('h2') !== null;
            if (inH1) {
                headingLabel.textContent = 'H1';
                headingTooltip.textContent = 'Heading 1 — click for H2';
                headingBtn.classList.add('active');
            } else if (inH2) {
                headingLabel.textContent = 'H2';
                headingTooltip.textContent = 'Heading 2 — click to clear';
                headingBtn.classList.add('active');
            } else {
                headingLabel.textContent = 'H';
                headingTooltip.textContent = 'Heading: Off';
                headingBtn.classList.remove('active');
            }
            listBtn.classList.toggle('active', node.closest('ul') !== null);
        }

        function updateWordCounter() {
            const text = editor.textContent || '';
            const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('word-counter').textContent = wordCount + ' word' + (wordCount === 1 ? '' : 's');
        }

        function updateScrollPadding() {
            const hasOverflow = document.documentElement.scrollHeight > document.documentElement.clientHeight;
            editor.classList.toggle('has-overflow', hasOverflow);
        }

        function isEditorEmpty() {
            const text = editor.textContent || '';
            if (text.trim().length > 0) return false;
            if (text.length > 0) return false;
            if (editor.querySelector('ul, ol, li, hr, h1, h2, h3, blockquote, pre, table, img')) return false;

            const html = editor.innerHTML.trim();
            const emptyPatterns = ['', '<br>', '<br/>', '<div><br></div>', '<p><br></p>'];
            return emptyPatterns.includes(html);
        }

        editor.addEventListener('input', () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveContent, 500);
            updateWordCounter();
            updateScrollPadding();
            editorPlaceholder.classList.toggle('visible', isEditorEmpty());
        });

        editor.addEventListener('paste', (e) => {
            e.preventDefault();
            const html = e.clipboardData.getData('text/html');
            const text = e.clipboardData.getData('text/plain');
            if (html) {
                const clean = DOMPurify.sanitize(html, PURIFY_CONFIG);
                document.execCommand('insertHTML', false, clean);
            } else if (text) {
                document.execCommand('insertText', false, text);
            }
            editorPlaceholder.classList.toggle('visible', isEditorEmpty());
        });

        toolbarBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const command = btn.dataset.command;
                const value = btn.dataset.value;
                execCommand(command, value);
            });
        });

        headingBtn.addEventListener('click', () => {
            editor.focus();
            const block = getCurrentBlock();
            if (!block) {
                execCommand('formatBlock', 'H1');
                return;
            }
            if (block.tagName === 'H1') {
                execCommand('formatBlock', 'H2');
            } else if (block.tagName === 'H2') {
                execCommand('formatBlock', 'P');
            } else {
                execCommand('formatBlock', 'H1');
            }
        });

        fontBtn.addEventListener('click', cycleFont);
        copyBtn.addEventListener('click', copyText);
        themeToggle.addEventListener('click', toggleTheme);

        sidebarToggle.addEventListener('click', toggleSidebar);
        sidebarToggleHeader.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', () => {
            if (isSidebarOverlayMode()) {
                closeSidebar();
            }
        });
        newNoteBtn.addEventListener('click', createNote);

        sidebarNotes.addEventListener('click', (e) => {
            const deleteBtn = e.target.closest('.sidebar-note-delete');
            if (deleteBtn) {
                const item = deleteBtn.closest('.sidebar-note-item');
                if (item) {
                    const id = item.getAttribute('data-note-id');
                    const note = notes.find(n => n.id === id);
                    const title = note ? escapeHtml(getNoteTitle(note.content)) : 'this note';
                    if (e.shiftKey) {
                        deleteNote(id);
                    } else {
                        showConfirmDialog('Delete <strong>' + title + '</strong>?', () => deleteNote(id));
                    }
                }
                return;
            }
            const titleBtn = e.target.closest('.sidebar-note-title-btn');
            if (titleBtn) {
                const item = titleBtn.closest('.sidebar-note-item');
                if (item) switchNote(item.getAttribute('data-note-id'));
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && confirmOverlay.classList.contains('active')) {
                hideConfirmDialog();
                return;
            }
            if (e.key === 'Escape' && sidebar.classList.contains('open') && isSidebarOverlayMode()) {
                closeSidebar();
            }
        });

        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                document.execCommand('insertText', false, '    ');
                return;
            }

            const mod = e.metaKey || e.ctrlKey;
            if (mod && e.shiftKey) {
                if (e.key === '8' || e.key === '*') {
                    e.preventDefault();
                    execCommand('insertUnorderedList');
                    return;
                }
                if (e.key === '-' || e.key === '_') {
                    e.preventDefault();
                    insertHorizontalRule();
                    saveContent();
                    updateWordCounter();
                    editorPlaceholder.classList.toggle('visible', isEditorEmpty());
                    updateToolbarActiveState();
                    return;
                }
            }

            if (e.key === ' ' || e.key === 'Spacebar') {
                const block = getCurrentBlock();
                if (block) {
                    const text = block.textContent;
                    if (/^[-*]$/.test(text)) {
                        e.preventDefault();
                        convertLineToList(block);
                        saveContent();
                        updateWordCounter();
                        editorPlaceholder.classList.toggle('visible', isEditorEmpty());
                        updateToolbarActiveState();
                        return;
                    }
                }
            }

            if (e.key === 'Enter') {
                const block = getCurrentBlock();
                if (block) {
                    const text = block.textContent.trim();
                    if (/^[-*_]{3,}$/.test(text)) {
                        e.preventDefault();
                        convertLineToHr(block);
                        saveContent();
                        updateWordCounter();
                        editorPlaceholder.classList.toggle('visible', isEditorEmpty());
                        updateToolbarActiveState();
                        return;
                    }
                }
            }
        });

        document.addEventListener('selectionchange', () => {
            updateToolbarActiveState();
        });

        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                cancelAnimationFrame(animationId);
                generateAsciiWave();
                updateScrollPadding();
            }, 150);
        });

        window.addEventListener('beforeunload', () => {
            clearTimeout(saveTimeout);
            saveContent();
        });

        const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
        let reducedMotion = motionQuery.matches;

        motionQuery.addEventListener('change', (e) => {
            reducedMotion = e.matches;
            if (reducedMotion) {
                cancelAnimationFrame(animationId);
                asciiBg.textContent = '';
            } else {
                generateAsciiWave();
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                clearTimeout(saveTimeout);
                saveContent();
                cancelAnimationFrame(animationId);
            } else if (!reducedMotion) {
                generateAsciiWave();
            }
        });

        loadSettings();
        updateScrollPadding();
        if (!reducedMotion) {
            generateAsciiWave();
        }
    </script>
</body>
</html>
