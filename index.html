<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Notepad</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="manifest" href="site.webmanifest">
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <meta name="theme-color" content="#333333">
    <style>
        :root {
            --bg-color: #F0EEE6;
            --text-color: #333333;
            --accent-color: #666666;
            --border-color: rgba(0, 0, 0, 0.1);
            --toolbar-bg: rgba(255, 255, 255, 0.9);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --critical: #c53030;
            --critical-bg: rgba(197, 48, 48, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #999999;
            --border-color: rgba(255, 255, 255, 0.15);
            --toolbar-bg: rgba(40, 40, 40, 0.95);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --critical: #ff6b6b;
            --critical-bg: rgba(255, 107, 107, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #ascii-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.08;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.2;
            white-space: pre;
            overflow: hidden;
            color: var(--text-color);
        }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--toolbar-bg);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        #theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        #editor-container {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 80px 20px 120px;
            min-height: 100vh;
        }

        #editor {
            width: 100%;
            min-height: 60vh;
            outline: none;
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-color);
            background: transparent;
        }

        #editor-placeholder {
            position: absolute;
            top: 78px;
            left: 20px;
            color: var(--accent-color);
            opacity: 0.6;
            pointer-events: none;
            font-size: 18px;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            display: none;
        }

        #editor-placeholder.visible {
            display: inline-block;
        }

        #storage-warning {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: var(--critical-bg);
            border: 1px solid var(--critical);
            color: var(--critical);
            border-radius: 50px;
            font-size: 13px;
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            backdrop-filter: blur(10px);
        }

        #storage-warning.visible {
            opacity: 1;
            visibility: visible;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .font-serif {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
        }

        .font-sans {
            font-family: 'Inter', sans-serif;
        }

        #editor h1 {
            font-size: 2em;
            font-weight: 600;
            margin: 0.5em 0;
            line-height: 1.3;
        }

        #editor h2 {
            font-size: 1.5em;
            font-weight: 500;
            margin: 0.5em 0;
            line-height: 1.4;
        }

        #editor p {
            margin: 0.8em 0;
        }

        #editor b, #editor strong {
            font-weight: 600;
        }

        #editor i, #editor em {
            font-style: italic;
        }

        #toolbar {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 8px;
            padding: 12px;
            background: var(--toolbar-bg);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            box-shadow: 0 4px 20px var(--shadow-color);
            opacity: 0.6;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        #toolbar:hover {
            opacity: 1;
        }

        .toolbar-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            color: var(--text-color);
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s ease;
            position: relative;
        }

        .toolbar-btn:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        .toolbar-btn.active {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .toolbar-btn .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            padding: 6px 10px;
            background: var(--text-color);
            color: var(--bg-color);
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .toolbar-btn:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        .font-indicator {
            font-size: 12px;
            font-weight: 500;
        }

        #bottom-left {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            z-index: 100;
        }

        #word-counter {
            padding: 10px 16px;
            background: var(--toolbar-bg);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            font-size: 12px;
            color: var(--accent-color);
            font-family: 'JetBrains Mono', monospace;
            backdrop-filter: blur(10px);
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        #word-counter:hover {
            opacity: 1;
        }

        #paste-md-btn {
            padding: 10px 14px;
            background: var(--toolbar-bg);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-color);
            font-size: 12px;
            backdrop-filter: blur(10px);
            opacity: 0.6;
            transition: opacity 0.3s ease;
            position: relative;
        }

        #paste-md-btn:hover {
            opacity: 1;
        }

        #paste-md-btn .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            padding: 6px 10px;
            background: var(--text-color);
            color: var(--bg-color);
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        #paste-md-btn:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--toolbar-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px var(--shadow-color);
            backdrop-filter: blur(10px);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 500;
            font-size: 16px;
        }

        .modal-close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-color);
            padding: 0;
            line-height: 1;
        }

        .modal-close-btn:hover {
            opacity: 0.6;
        }

        #md-input {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }

        #md-input:focus {
            border-color: var(--accent-color);
        }

        .modal-note {
            margin-top: 12px;
            font-size: 13px;
            color: var(--accent-color);
            line-height: 1.4;
        }

        .modal-note strong, .modal-note em, .modal-note code {
            font-size: 12px;
            padding: 1px 4px;
            border-radius: 3px;
            background: var(--border-color);
        }

        .modal-note code {
            font-family: 'JetBrains Mono', monospace;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }

        .modal-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .modal-btn.primary {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .modal-btn.primary:hover {
            opacity: 0.85;
        }

        .modal-btn.secondary {
            background: transparent;
            color: var(--text-color);
        }

        .modal-btn.secondary:hover {
            background: var(--border-color);
        }

        @media (max-width: 600px) {
            #editor-container {
                padding: 60px 16px 100px;
            }

            #editor {
                font-size: 16px;
            }

            #toolbar {
                bottom: 20px;
                right: 20px;
                padding: 8px;
                gap: 4px;
            }

            .toolbar-btn {
                width: 36px;
                height: 36px;
            }

            #theme-toggle {
                top: 16px;
                right: 16px;
                width: 40px;
                height: 40px;
            }

            #bottom-left {
                bottom: 20px;
                left: 20px;
            }

            #word-counter {
                padding: 8px 12px;
                font-size: 11px;
            }

            #paste-md-btn {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div id="ascii-background"></div>

    <button id="theme-toggle" aria-label="Toggle theme">
        <span id="theme-icon">🌙</span>
    </button>

    <div id="storage-warning">Storage full — copy your text to avoid losing work</div>

    <div id="editor-container">
        <div id="editor-placeholder" class="font-sans visible">Start writing...</div>
        <div id="editor" class="font-sans" role="textbox" aria-multiline="true" aria-label="Editor" contenteditable="true" spellcheck="false"></div>
    </div>

    <div id="bottom-left">
        <button id="paste-md-btn" aria-label="Import Markdown">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="7" y="4" width="10" height="14" rx="2" ry="2"></rect>
                <rect x="9" y="2" width="6" height="3" rx="1" ry="1"></rect>
            </svg>
            <span class="tooltip">Import Markdown</span>
        </button>
        <div id="word-counter">0 words</div>
    </div>

    <div id="md-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Import Markdown">
        <div class="modal-content">
            <div class="modal-header">
                <span>Import Markdown</span>
                <button id="modal-close" class="modal-close-btn" aria-label="Close">&times;</button>
            </div>
            <textarea id="md-input" placeholder="Paste your markdown here..."></textarea>
            <div class="modal-note">
                Converts: <strong>**bold**</strong>, <em>*italic*</em>, <code># heading</code>, <code>## heading</code>. Other formatting is preserved as plain text.
            </div>
            <div class="modal-footer">
                <button id="modal-cancel" class="modal-btn secondary">Cancel</button>
                <button id="modal-insert" class="modal-btn primary">Convert & Insert</button>
            </div>
        </div>
    </div>

    <div id="toolbar">
        <button class="toolbar-btn" data-command="bold" aria-label="Bold">
            <b>B</b>
            <span class="tooltip">Bold</span>
        </button>
        <button class="toolbar-btn" data-command="italic" aria-label="Italic">
            <i>I</i>
            <span class="tooltip">Italic</span>
        </button>
        <button class="toolbar-btn" data-command="formatBlock" data-value="H1" aria-label="Heading 1">
            <b>H1</b>
            <span class="tooltip">Heading 1</span>
        </button>
        <button class="toolbar-btn" data-command="formatBlock" data-value="H2" aria-label="Heading 2">
            <b>H2</b>
            <span class="tooltip">Heading 2</span>
        </button>
        <button class="toolbar-btn" id="font-btn" aria-label="Change font">
            <span class="font-indicator">Aa</span>
            <span class="tooltip">Change Font</span>
        </button>
        <button class="toolbar-btn" id="copy-btn" aria-label="Copy text">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <span class="tooltip">Copy Markdown</span>
        </button>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const fontBtn = document.getElementById('font-btn');
        const copyBtn = document.getElementById('copy-btn');
        const asciiBg = document.getElementById('ascii-background');
        const toolbarBtns = document.querySelectorAll('.toolbar-btn[data-command]');
        const editorPlaceholder = document.getElementById('editor-placeholder');

        const fonts = ['font-sans', 'font-serif', 'font-mono'];
        const fontNames = ['Sans', 'Serif', 'Mono'];
        let currentFontIndex = 0;

        let saveTimeout;
        let animationId;
        let time = 0;

        const chars = ['█', '▓', '▒', '░', '·'];

        const PURIFY_CONFIG = {
            ALLOWED_TAGS: ['p', 'br', 'div', 'h1', 'h2', 'h3', 'strong', 'b', 'em', 'i', 'ul', 'li', 'blockquote', 'code', 'pre', 'a', 'span'],
            ALLOWED_ATTR: ['href', 'class']
        };

        const storageWarning = document.getElementById('storage-warning');
        let resizeTimeout;

        function showStorageWarning() {
            storageWarning.classList.add('visible');
        }

        function hideStorageWarning() {
            storageWarning.classList.remove('visible');
        }

        function fallbackCopy(text, onSuccess, onError) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                const success = document.execCommand('copy');
                document.body.removeChild(textarea);
                if (success) onSuccess(); else onError();
            } catch (e) {
                document.body.removeChild(textarea);
                onError();
            }
        }

        function generateAsciiWave() {
            const width = Math.ceil(window.innerWidth / 8.4) + 2;
            const height = Math.ceil(window.innerHeight / 17);
            let output = '';

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const wave1 = Math.sin((x * 0.1) + (time * 0.02));
                    const wave2 = Math.cos((y * 0.08) + (time * 0.015));
                    const wave3 = Math.sin(((x + y) * 0.05) + (time * 0.01));
                    
                    const value = (wave1 + wave2 + wave3 + 3) / 6;
                    const charIndex = Math.floor(value * (chars.length - 1));
                    output += chars[Math.min(Math.max(charIndex, 0), chars.length - 1)];
                }
                output += '\n';
            }

            asciiBg.textContent = output;
            time++;
            animationId = requestAnimationFrame(generateAsciiWave);
        }

        function loadSettings() {
            const savedContent = localStorage.getItem('zen-content');
            const savedFont = localStorage.getItem('zen-font');
            const savedTheme = localStorage.getItem('zen-theme');

            if (savedContent) {
                const clean = DOMPurify.sanitize(savedContent, PURIFY_CONFIG);
                editor.innerHTML = clean;
            }
            editorPlaceholder.classList.toggle('visible', editor.textContent.trim().length === 0);

            if (savedFont) {
                const fontIndex = fonts.indexOf(savedFont);
                if (fontIndex !== -1) {
                    currentFontIndex = fontIndex;
                    applyFont();
                }
            }

            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
            } else {
                document.body.removeAttribute('data-theme');
                themeIcon.textContent = '🌙';
            }

            updateWordCounter();
        }

        function saveContent() {
            try {
                localStorage.setItem('zen-content', editor.innerHTML);
                hideStorageWarning();
            } catch (e) {
                if (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014) {
                    showStorageWarning();
                }
            }
        }

        function applyFont() {
            fonts.forEach(f => {
                editor.classList.remove(f);
                editorPlaceholder.classList.remove(f);
            });
            editor.classList.add(fonts[currentFontIndex]);
            editorPlaceholder.classList.add(fonts[currentFontIndex]);
            try {
                localStorage.setItem('zen-font', fonts[currentFontIndex]);
            } catch (e) {
            }
        }

        function cycleFont() {
            currentFontIndex = (currentFontIndex + 1) % fonts.length;
            applyFont();
            
            const originalText = fontBtn.querySelector('.font-indicator').textContent;
            fontBtn.querySelector('.font-indicator').textContent = fontNames[currentFontIndex];
            setTimeout(() => {
                fontBtn.querySelector('.font-indicator').textContent = 'Aa';
            }, 800);
        }

        function toggleTheme() {
            const isDark = document.body.hasAttribute('data-theme');
            if (isDark) {
                document.body.removeAttribute('data-theme');
                themeIcon.textContent = '🌙';
                try {
                    localStorage.setItem('zen-theme', 'light');
                } catch (e) {
                }
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
                try {
                    localStorage.setItem('zen-theme', 'dark');
                } catch (e) {
                }
            }
        }

        function showCopiedFeedback(btn) {
            const tooltip = btn.querySelector('.tooltip');
            const originalText = tooltip.textContent;
            tooltip.textContent = 'Copied!';
            setTimeout(() => {
                tooltip.textContent = originalText;
            }, 1200);
        }

        function htmlToMarkdown(element) {
            let markdown = '';
            
            function traverse(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return node.textContent;
                }
                
                if (node.nodeType !== Node.ELEMENT_NODE) {
                    return '';
                }
                
                const tag = node.tagName.toLowerCase();
                let content = '';
                
                for (const child of node.childNodes) {
                    content += traverse(child);
                }
                
                switch (tag) {
                    case 'h1':
                        return '# ' + content.trim() + '\n\n';
                    case 'h2':
                        return '## ' + content.trim() + '\n\n';
                    case 'h3':
                        return '### ' + content.trim() + '\n\n';
                    case 'b':
                    case 'strong':
                        return '**' + content + '**';
                    case 'i':
                    case 'em':
                        return '*' + content + '*';
                    case 'p':
                        return content.trim() + '\n\n';
                    case 'br':
                        return '\n';
                    case 'div':
                        return content + '\n';
                    case 'ul':
                        return content;
                    case 'li':
                        return '- ' + content.trim() + '\n';
                    case 'blockquote':
                        return '> ' + content.trim().replace(/\n/g, '\n> ') + '\n\n';
                    case 'code':
                        return '`' + content + '`';
                    case 'pre':
                        return '\`\`\`\n' + content.trim() + '\n\`\`\`\n\n';
                    case 'a':
                        const href = node.getAttribute('href') || '';
                        return '[' + content + '](' + href + ')';
                    default:
                        return content;
                }
            }
            
            for (const child of element.childNodes) {
                markdown += traverse(child);
            }
            
            return markdown.trim();
        }

        function markdownToHtml(markdown) {
            const lines = markdown.split('\n');
            let html = '';
            let inParagraph = false;
            let inList = false;
            let inBlockquote = false;
            let inCodeBlock = false;
            let codeBuffer = '';

            function convertInline(text) {
                text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
                text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
                text = text.replace(/(?<!\*)\*\*\*(?!\*)(.+?)(?<!\*)\*\*\*(?!\*)/g, '<strong><em>$1</em></strong>');
                text = text.replace(/(?<!\*)\*\*(?!\*)(.+?)(?<!\*)\*\*(?!\*)/g, '<strong>$1</strong>');
                text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
                text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
                text = text.replace(/(?<!\w)_(.+?)_(?!\w)/g, '<em>$1</em>');
                return text;
            }

            function closeParagraph() {
                if (inParagraph) {
                    html += '</p>';
                    inParagraph = false;
                }
            }

            function closeList() {
                if (inList) {
                    html += '</ul>';
                    inList = false;
                }
            }

            function closeBlockquote() {
                if (inBlockquote) {
                    html += '</blockquote>';
                    inBlockquote = false;
                }
            }

            function closeCodeBlock() {
                if (inCodeBlock) {
                    html += '</code></pre>';
                    inCodeBlock = false;
                    codeBuffer = '';
                }
            }

            for (let i = 0; i < lines.length; i++) {
                const rawLine = lines[i];
                const line = rawLine.trim();

                if (inCodeBlock) {
                    if (line === '```') {
                        closeCodeBlock();
                    } else {
                        codeBuffer += rawLine + '\n';
                    }
                    continue;
                }

                if (line === '```') {
                    closeParagraph();
                    closeList();
                    closeBlockquote();
                    inCodeBlock = true;
                    codeBuffer = '';
                    html += '<pre><code>';
                    continue;
                }

                if (line === '') {
                    closeParagraph();
                    closeList();
                    closeBlockquote();
                    continue;
                }

                if (line.startsWith('# ')) {
                    closeParagraph();
                    closeList();
                    closeBlockquote();
                    html += '<h1>' + convertInline(line.substring(2)) + '</h1>';
                } else if (line.startsWith('## ')) {
                    closeParagraph();
                    closeList();
                    closeBlockquote();
                    html += '<h2>' + convertInline(line.substring(3)) + '</h2>';
                } else if (line.startsWith('### ')) {
                    closeParagraph();
                    closeList();
                    closeBlockquote();
                    html += '<h3>' + convertInline(line.substring(4)) + '</h3>';
                } else if (line.startsWith('- ') || line.startsWith('* ')) {
                    closeParagraph();
                    closeBlockquote();
                    if (!inList) {
                        inList = true;
                        html += '<ul>';
                    }
                    html += '<li>' + convertInline(line.substring(2)) + '</li>';
                } else if (line.startsWith('> ')) {
                    closeParagraph();
                    closeList();
                    if (!inBlockquote) {
                        inBlockquote = true;
                        html += '<blockquote>';
                    }
                    html += '<p>' + convertInline(line.substring(2)) + '</p>';
                } else {
                    closeList();
                    closeBlockquote();
                    if (!inParagraph) {
                        html += '<p>';
                        inParagraph = true;
                    } else {
                        html += ' ';
                    }
                    html += convertInline(line);
                }
            }

            closeParagraph();
            closeList();
            closeBlockquote();
            closeCodeBlock();

            return html;
        }

        function copyText() {
            const markdown = htmlToMarkdown(editor);
            
            function onSuccess() {
                showCopiedFeedback(copyBtn);
            }
            
            function onError() {
                const tooltip = copyBtn.querySelector('.tooltip');
                const originalText = tooltip.textContent;
                tooltip.textContent = 'Copy failed';
                setTimeout(() => {
                    tooltip.textContent = originalText;
                }, 1200);
            }
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(markdown).then(onSuccess).catch(() => {
                    fallbackCopy(markdown, onSuccess, onError);
                });
            } else {
                fallbackCopy(markdown, onSuccess, onError);
            }
        }

        const mdModal = document.getElementById('md-modal');
        const mdInput = document.getElementById('md-input');
        const pasteMdBtn = document.getElementById('paste-md-btn');
        const modalClose = document.getElementById('modal-close');
        const modalCancel = document.getElementById('modal-cancel');
        const modalInsert = document.getElementById('modal-insert');

        function trapFocus(e) {
            if (e.key !== 'Tab') return;
            const focusable = mdModal.querySelectorAll('button, textarea');
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            
            if (e.shiftKey) {
                if (document.activeElement === first) {
                    e.preventDefault();
                    last.focus();
                }
            } else {
                if (document.activeElement === last) {
                    e.preventDefault();
                    first.focus();
                }
            }
        }

        function openModal() {
            mdModal.classList.add('active');
            mdModal.removeAttribute('aria-hidden');
            document.getElementById('editor-container').setAttribute('aria-hidden', 'true');
            document.getElementById('toolbar').setAttribute('aria-hidden', 'true');
            document.getElementById('bottom-left').setAttribute('aria-hidden', 'true');
            document.getElementById('theme-toggle').setAttribute('aria-hidden', 'true');
            mdInput.value = '';
            mdInput.focus();
            document.addEventListener('keydown', trapFocus);
        }

        function closeModal() {
            mdModal.classList.remove('active');
            mdModal.setAttribute('aria-hidden', 'true');
            document.getElementById('editor-container').removeAttribute('aria-hidden');
            document.getElementById('toolbar').removeAttribute('aria-hidden');
            document.getElementById('bottom-left').removeAttribute('aria-hidden');
            document.getElementById('theme-toggle').removeAttribute('aria-hidden');
            editor.focus();
            document.removeEventListener('keydown', trapFocus);
        }

        function insertMarkdown() {
            const md = mdInput.value;
            if (!md.trim()) {
                closeModal();
                return;
            }

            const html = markdownToHtml(md);
            const clean = DOMPurify.sanitize(html, PURIFY_CONFIG);

            editor.focus();

            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                if (editor.contains(range.commonAncestorContainer)) {
                    range.deleteContents();
                    const frag = document.createRange().createContextualFragment(clean);
                    range.insertNode(frag);
                    range.collapse(false);
                    sel.removeAllRanges();
                    sel.addRange(range);
                } else {
                    if (editor.innerHTML.trim()) {
                        const space = document.createElement('span');
                        space.innerHTML = ' ';
                        editor.appendChild(space);
                    }
                    const frag = document.createRange().createContextualFragment(clean);
                    editor.appendChild(frag);
                }
            } else {
                if (editor.innerHTML.trim()) {
                    const space = document.createElement('span');
                    space.innerHTML = ' ';
                    editor.appendChild(space);
                }
                const frag = document.createRange().createContextualFragment(clean);
                editor.appendChild(frag);
            }

            editorPlaceholder.classList.toggle('visible', editor.textContent.trim().length === 0);
            saveContent();
            closeModal();
        }

        pasteMdBtn.addEventListener('click', openModal);
        modalClose.addEventListener('click', closeModal);
        modalCancel.addEventListener('click', closeModal);
        modalInsert.addEventListener('click', insertMarkdown);

        mdModal.addEventListener('click', (e) => {
            if (e.target === mdModal) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && mdModal.classList.contains('active')) {
                closeModal();
            }
        });

        function execCommand(command, value = null) {
            document.execCommand(command, false, value);
            editor.focus();
        }

        function updateWordCounter() {
            const text = editor.textContent || '';
            const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('word-counter').textContent = wordCount + ' word' + (wordCount === 1 ? '' : 's');
        }

        editor.addEventListener('input', () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveContent, 500);
            updateWordCounter();
            editorPlaceholder.classList.toggle('visible', editor.textContent.trim().length === 0);
        });

        editor.addEventListener('paste', (e) => {
            e.preventDefault();
            const html = e.clipboardData.getData('text/html');
            const text = e.clipboardData.getData('text/plain');
            if (html) {
                const clean = DOMPurify.sanitize(html, PURIFY_CONFIG);
                document.execCommand('insertHTML', false, clean);
            } else if (text) {
                document.execCommand('insertText', false, text);
            }
            editorPlaceholder.classList.toggle('visible', editor.textContent.trim().length === 0);
        });

        toolbarBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const command = btn.dataset.command;
                const value = btn.dataset.value;
                execCommand(command, value);
            });
        });

        fontBtn.addEventListener('click', cycleFont);
        copyBtn.addEventListener('click', copyText);
        themeToggle.addEventListener('click', toggleTheme);

        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                document.execCommand('insertText', false, '    ');
            }
        });

        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                cancelAnimationFrame(animationId);
                generateAsciiWave();
            }, 150);
        });

        window.addEventListener('beforeunload', () => {
            clearTimeout(saveTimeout);
            saveContent();
        });

        const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
        let reducedMotion = motionQuery.matches;

        motionQuery.addEventListener('change', (e) => {
            reducedMotion = e.matches;
            if (reducedMotion) {
                cancelAnimationFrame(animationId);
                asciiBg.textContent = '';
            } else {
                generateAsciiWave();
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                clearTimeout(saveTimeout);
                saveContent();
                cancelAnimationFrame(animationId);
            } else if (!reducedMotion) {
                generateAsciiWave();
            }
        });

        loadSettings();
        if (!reducedMotion) {
            generateAsciiWave();
        }
    </script>
</body>
</html>
